spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/yolofarm_db}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
  jackson:
    property-naming-strategy: SNAKE_CASE

logging:
  level:
    com.yoloFarm: INFO

jwt:
  secret-key: ${JWT_SECRET_KEY}
  expiration: 86400000

adafruit:
  mqtt:
    broker-url: ${ADAFRUIT_BROKER_URL:ssl://io.adafruit.com:8883}
    client-id: "YoloFarm_${random.int[100,999]}"
    username: ${ADAFRUIT_USERNAME}
    password: ${ADAFRUIT_IO_KEY}

app:
  websocket:
    allowed-origins: ${WS_ALLOWED_ORIGINS:http://localhost:3000}
  automation:
    rule-command-cooldown-seconds: ${AUTOMATION_RULE_COOLDOWN_SECONDS:30}
    max-auto-on-minutes: ${AUTOMATION_MAX_AUTO_ON_MINUTES:20}
    auto-off-watchdog-interval-ms: ${AUTOMATION_AUTO_OFF_WATCHDOG_INTERVAL_MS:30000}
