spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/yolofarm_db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        "format_sql": true
  jackson:
    property-naming-strategy: SNAKE_CASE

jwt:
  secret-key: ${JWT_SECRET_KEY}
  expiration: 86400000

adafruit:
  mqtt:
    broker-url: ${ADAFRUIT_BROKER_URL:ssl://io.adafruit.com:8883}
    client-id: "YoloFarm_${random.int[100,999]}"
    username: ${ADAFRUIT_USERNAME}
    password: ${ADAFRUIT_IO_KEY}

app:
  websocket:
    allowed-origins: ${WS_ALLOWED_ORIGINS:http://localhost:3000}
